{% extends "base.html" %}

{% block extrahead %}
<meta property="robots" content="index, follow" />
<meta name="keywords" content="SAP LinuxLab, SAP automation, SAP Ansible, SAP Terraform, SAP linux, SAP Linux Lab, SAP Technology Partners">
<meta name="author" content="SAP LinuxLab open-source initiative">

<meta property="og:type" content="website">
{% set page_url = config.site_url ~ page.url if config.site_url else page.canonical_url %}
<meta property="og:url" content="{{ page_url }}">
<meta property="og:title" content="{{ page.title }} | SAP LinuxLab Open-Source Initiative" />
<meta name="description" content="{{ page.meta.description if page.meta and page.meta.description else 'Open-source by SAP Technology Partners, for SAP Customers and SAP Service Partners.' }}" />
<meta property="og:image" content="https://sap-linuxlab.github.io/assets/img/sap_linuxlab_logo.png" />
<meta property="og:image:width" content="600" />
<meta property="og:image:height" content="600" />
{% endblock %}
