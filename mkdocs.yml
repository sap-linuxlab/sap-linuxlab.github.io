---

site_name: SAP LinuxLab Open-Source Initiative
site_url: https://sap-linuxlab.github.io

nav:
    - Home: index.md
    - About: initiative_about.md
    - Participants: initiative_participating_companies.md
    - Governance: initiative_governance.md
    - Contribute:
      - Overview: contribute/index.md
      - Existing Projects:
          - Participate in a Project: contribute/participate.md
          - Fork a Repository: contribute/create_a_fork.md
      - New Projects:
          - Submit a New Repository: contribute/submit_new_repository.md
      - Developer Tools:
          - Developer Guidelines: contribute/developer_guidelines.md
          - Install pre-commit: contribute/install_pre_commit.md
          - Ansible Dev Guidelines: contribute/ansible_dev_guidelines.md
      - README Templates:
          - Ansible Collection: readme_templates/readme_ansible_collection.md
          - Ansible Playbooks: readme_templates/readme_ansible_playbooks.md
      - GitHub Discussions: https://github.com/sap-linuxlab/sap-linuxlab.github.io/discussions
    - Automation Projects:
      - Projects: automation_projects.md
      - Demos: automation_demos.md
    - Other Projects: other_projects.md
    - FAQ: faq.md

theme:
  name: material
  custom_dir: material_theme_custom
  language: en
  font:
    text: Roboto
  icon:
    logo: 'material/open-source-initiative'
  favicon: assets/img/sap_linuxlab_logo.png
  features:
    - toc.integrate
    - search.share
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode

extra_css:
  - assets/stylesheets/extra.css
  - assets/stylesheets/asciinema-3-8-1-player.css

extra_javascript:
  - assets/javascripts/asciinema-3-8-1-player.min.js
  - assets/javascripts/unhide_div.js

plugins:
  - search

hooks:
  - hooks.py

markdown_extensions:
  - meta
  - admonition # For FAQ page
  - attr_list
  - tables
  - pymdownx.snippets:
      base_path: docs
      check_paths: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji 
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social: true # Repurpose for cookies setting in footer (GDPR requirement), set this to true to trigger standard theme logic
  analytics:
    provider: google
    property: G-F750F4XHER
  consent:
    title: Cookie consent
    description: >- 
      Cookies are used to understand user count worldwide and the effectiveness of information on the initiative homepage.
      With your consent, you're helping us to improve the initiative.
    actions:
      - accept
      - reject
    cookies:
      analytics:
        name: Google Analytics
        checked: false
